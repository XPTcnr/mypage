<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <title>時間軸排版</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss.css">
    <style>
        .pimg {
            height: 260px;
        }

        .bg-cover {
            background-position: center center;
            background-size: cover;
        }

        .timeline-section {
            position: relative;
        }

        .timeline-section::before {
            position: absolute;
            content: "";
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: var(--graffiti-rust-orange);
            left: 50%;
            transform: translateX(-50%);
        }

        .timeline-section-pointer {
            position: relative;
        }

        .timeline-section-pointer::before {
            position: absolute;
            content: "";
            width: 24px;
            height: 24px;
            background-color: var(--graffiti-concrete-ash);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            border: 6px solid var(--graffiti-deep-alley);
        }

        .timeline-section-pointer:hover::before {
            width: 32px;
            height: 32px;
        }

        @media screen and (max-width: 768px) {
            .timeline-section::before {
                display: none;
            }

            .timeline-section-pointer::before {
                display: none;
            }
        }
    </style>
</head>
